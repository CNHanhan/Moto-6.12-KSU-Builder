name: Build Moto Vantage (Android 16) Kernel with KSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 释放磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force

    - name: 安装基础环境
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm repo python3

    - name: 拉取 Motorola 官方源码 (Vantage Tag)
      run: |
        # 直接克隆你提供的那个特定 Tag
        git clone https://github.com/MotorolaMobilityLLC/kernel-msm.git -b MMI-W2WV36.55-25-15 --depth=1 kernel

    - name: 集成 KernelSU
      run: |
        cd kernel
        # 6.12 内核建议使用最新版 KSU
        curl -ls https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    - name: 配置编译选项 (LTO & Page Size)
      run: |
        cd kernel
        # 针对 vantage 这种现代设备，必须确保配置正确
        # 如果是 GKI 架构，通常使用 gki_defconfig
        # 如果是传统架构，查找 arch/arm64/configs/vendor/vantage_defconfig
        echo "CONFIG_KPROBES=y" >> arch/arm64/configs/gki_defconfig || true
        echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/gki_defconfig || true

    - name: 执行编译 (使用内置工具链)
      run: |
        cd kernel
        # 现代摩托罗拉源码通常自带构建脚本或使用 Bazel
        # 如果源码根目录有 build.config，优先使用它
        if [ -f "build.config" ]; then
          LTO=thin ./build/build.sh
        else
          # 备选方案：手动编译
          make O=out ARCH=arm64 gki_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu-
        fi

    - name: 提取产物
      uses: actions/upload-artifact@v4
      with:
        name: vantage-ksu-kernel
        path: |
          kernel/out/dist/boot.img
          kernel/out/dist/init_boot.img
          kernel/out/arch/arm64/boot/Image
