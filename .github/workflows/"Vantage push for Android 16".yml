name: Build Moto Vantage Official (Deep Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 极限释放磁盘空间
      run: |
        # 彻底清理无用组件，为 Bazel 腾出约 30GB 空间
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift
        sudo docker image prune --all --force

    - name: 安装环境依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm repo python3 curl

    - name: 下载并精准解压源码
      run: |
        # 下载你指定的官方 Tag 源码
        wget https://github.com/MotorolaMobilityLLC/kernel-msm/archive/refs/tags/MMI-W2WV36.55-25-15.tar.gz
        mkdir kernel-source
        tar -xzf MMI-W2WV36.55-25-15.tar.gz -C kernel-source --strip-components=1

    - name: 集成 KernelSU
      run: |
        cd kernel-source
        curl -ls https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    - name: 修复 Bazel 工具链与外部仓库路径
      run: |
        # 1. 彻底清理并重建父目录（解决 Permission denied）
        rm -rf ../tools ../build ../soc-repo
        mkdir -p ../tools ../build ../soc-repo
        
        # 2. 下载 Bazelisk (它会自动管理 Bazel 版本)
        # 下载到当前工作目录再移动，避免权限死锁
        curl -L https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o ./bazel
        chmod +x ./bazel
        mv ./bazel ../tools/bazel
        
        # 3. 伪造 soc-repo 软链接 (修复 msm_kernel_extensions.bzl 缺失)
        # 你的 tree 显示该文件在 kleaf-scripts 目录下
        ln -sf $(pwd)/kernel-source/kleaf-scripts ../soc-repo/kleaf-scripts
        
        # 4. 修复 build 软链接 (build_with_bazel.py 启动必需)
        ln -sf $(pwd)/kernel-source/kleaf-scripts ../build/kleaf-scripts

    - name: 执行 Bazel 构建 (针对 Canoe Vantage)
      run: |
        cd kernel-source
        # 将我们伪造的 tools 加入 PATH
        export PATH=$GITHUB_WORKSPACE/../tools:$PATH
        
        # 赋予脚本执行权限
        chmod +x build_with_bazel.py
        
        # 启动编译，限制资源防止 GitHub Actions 内存溢出 (OOM)
        # -t canoe vantage 对应你 configs/ext_config/ 下的配置文件
        python3 build_with_bazel.py -t canoe vantage -o out/dist \
          -- \
          --local_ram_resources=HOST_RAM*.6 \
          --local_cpu_resources=HOST_CPUS-1

    - name: 提取产物 (Artifacts)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vantage-ksu-boot-images
        # 即使编译失败，也尝试去抓取可能生成的 Image
        path: |
          kernel-source/out/dist/boot.img
          kernel-source/out/dist/init_boot.img
          kernel-source/out/dist/Image*
