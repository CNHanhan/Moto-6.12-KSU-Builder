name: Build Moto Vantage (Final Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 释放空间
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force

    - name: 环境准备
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm libarchive-tools python3

    - name: 下载并解压源码
      run: |
        wget https://github.com/MotorolaMobilityLLC/kernel-msm/archive/refs/tags/MMI-W2WV36.55-25-15.tar.gz
        mkdir kernel-source
        tar -xzf MMI-W2WV36.55-25-15.tar.gz -C kernel-source --strip-components=1

    - name: 集成 KernelSU
      run: |
        cd kernel-source
        curl -ls https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    - name: 使用 Bazel 编译 (针对 Canoe Vantage)
      run: |
        cd kernel-source
        # 修正参数：-t 后面需要两个参数，分别是平台(canoe)和机型(vantage)
        # 如果报错找不到目标，请尝试 -t canoe perf
        python3 build_with_bazel.py -t canoe vantage -o out/dist

    - name: 提取产物
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vantage-final-kernel
        # 现代 Bazel 编译产物通常直接在指定的 out 目录下
        path: |
          kernel-source/out/dist/boot.img
          kernel-source/out/dist/init_boot.img
          kernel-source/out/dist/Image*
