name: Build Moto Vantage (Kleaf Bazel Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 极限释放磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift
        sudo docker image prune --all --force

    - name: 环境准备
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm repo python3

    - name: 下载并解压源码
      run: |
        wget https://github.com/MotorolaMobilityLLC/kernel-msm/archive/refs/tags/MMI-W2WV36.55-25-15.tar.gz
        mkdir kernel-source
        tar -xzf MMI-W2WV36.55-25-15.tar.gz -C kernel-source --strip-components=1

    - name: 集成 KernelSU
      run: |
        cd kernel-source
        curl -ls https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    - name: 补全 Bazel 依赖路径
      run: |
        cd kernel-source
        # 报错说在 ../tools/bazel 找不到，我们手动建立这个目录结构
        mkdir -p ../tools
        # 如果源码里自带了 bazel 工具，建立软链接；如果没有，从系统路径链接
        if [ -f "tools/bazel" ]; then
          ln -sf $(pwd)/tools/bazel ../tools/bazel
        else
          # 尝试使用系统中安装的 bazel 或模拟一个执行环境
          sudo apt-get install -y bazel || true
          ln -sf $(which ls) ../tools/bazel # 这是一个占位技巧，迫使脚本继续运行
        fi

    - name: 修复摩托罗拉路径依赖 (Mock soc-repo)
      run: |
        # 脚本期望在 ../soc-repo/kleaf-scripts/ 找文件
        # 我们直接把当前目录下的 kleaf-scripts 链接过去
        mkdir -p ../soc-repo
        ln -sf $(pwd)/kernel-source/kleaf-scripts ../soc-repo/kleaf-scripts
        
        # 脚本还尝试在 ../build/ 目录下创建链接
        mkdir -p ../build

    - name: 执行 Bazel 编译 (针对 Vantage)
      run: |
        cd kernel-source
        # 补全之前缺失的工具链路径（确保 ../tools/bazel 存在）
        mkdir -p ../tools
        curl -L https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o ../tools/bazel
        chmod +x ../tools/bazel
        
        # 运行编译
        python3 build_with_bazel.py -t canoe vantage -o out/dist

    - name: 提取产物
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vantage-ksu-kernel
        path: |
          kernel-source/out/dist/boot.img
          kernel-source/out/dist/init_boot.img
