name: Build Moto Vantage (Official Bazel)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 释放服务器空间
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force

    - name: 安装环境依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm repo python3

    - name: 下载并精准解压源码
      run: |
        # 使用你提供的特定 Tag 链接
        wget https://github.com/MotorolaMobilityLLC/kernel-msm/archive/refs/tags/MMI-W2WV36.55-25-15.tar.gz
        mkdir kernel-source
        # 剥离一层文件夹，让 Makefile 直接出现在 kernel-source 根目录
        tar -xzf MMI-W2WV36.55-25-15.tar.gz -C kernel-source --strip-components=1

    - name: 集成 KernelSU
      run: |
        cd kernel-source
        curl -ls https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    - name: 使用 Bazel 极速编译 (推荐方案)
      run: |
        cd kernel-source
        # 你的源码树显示支持 Bazel 编译
        # 针对 Vantage 机型，通常使用 build.config.msm.canoe 或类似的配置
        # 这里尝试使用通用的 aarch64 编译目标
        LTO=thin ./build_with_bazel.py -t aarch64
      continue-on-error: true

    - name: 备选方案：传统方式编译 (如果 Bazel 失败)
      if: steps.bazel.outcome == 'failure'
      run: |
        cd kernel-source
        # 下载工具链
        git clone https://github.com/kdrag0n/proton-clang --depth=1 ../clang
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        
        # 查找配置：你的目录显示有多个 moto 相关的 config 文件
        # 我们使用 arch/arm64/configs/ 里的基础配置
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        
        # 执行编译
        make -j$(nproc) O=out ARCH=arm64 \
             CC=clang \
             CROSS_COMPILE=aarch64-linux-gnu- \
             CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
             AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
             OBJDUMP=llvm-objdump STRIP=llvm-strip

    - name: 提取产物
      uses: actions/upload-artifact@v4
      with:
        name: vantage-ksu-kernel
        path: |
          kernel-source/out/arch/arm64/boot/Image*
          kernel-source/out/dist/boot.img
